<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>
  
  <!-- Silhouette of corporate buildings -->
  <path d="M 0 600 L 0 500 L 60 500 L 60 420 L 110 420 L 110 320 L 160 320 L 160 220 L 240 220 L 240 370 L 290 370 L 290 450 L 340 450 L 340 550 L 400 550 L 400 600 Z" fill="#2c3e50"/>
  
  <!-- Spire -->
  <path d="M 190 220 L 195 120 L 205 120 L 210 220 Z" fill="#2c3e50"/>
  
  <!-- Glowing Windows -->
  <rect x="70" y="440" width="12" height="18" fill="#f1c40f" opacity="0.8"/>
  <rect x="90" y="460" width="12" height="18" fill="#f1c40f" opacity="0.8"/>
  <rect x="130" y="350" width="12" height="18" fill="#f1c40f" opacity="0.9"/>
  <rect x="180" y="270" width="12" height="18" fill="#f1c40f" opacity="0.9"/>
  <rect x="210" y="240" width="12" height="18" fill="#f1c40f" opacity="0.7"/>
  <rect x="260" y="400" width="12" height="18" fill="#f1c40f" opacity="0.8"/>
  <rect x="310" y="480" width="12" height="18" fill="#f1c40f" opacity="0.8"/>
  <rect x="360" y="570" width="12" height="18" fill="#f1c40f" opacity="0.6"/>

  <!-- Typography -->
  <text x="200" y="100" font-family="'Georgia', serif" font-size="46" font-weight="bold" fill="#1a252f" text-anchor="middle" letter-spacing="3">A MAN</text>
  <text x="200" y="160" font-family="'Georgia', serif" font-size="46" font-weight="bold" fill="#1a252f" text-anchor="middle" letter-spacing="3">IN FULL</text>
  
  <text x="200" y="550" font-family="'Arial', sans-serif" font-size="22" font-weight="bold" fill="#ecf0f1" text-anchor="middle" letter-spacing="6">TOM WOLFE</text>
</svg>
